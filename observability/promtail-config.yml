# Promtail: descubre contenedores Docker y envía líneas a Loki.
# Requiere montar /var/run/docker.sock (ver servicio promtail en docker-compose.yml).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Compose suele nombrar `…-backend-1`; mantener solo ese contenedor.
      - source_labels: [__meta_docker_container_name]
        regex: ".*backend.*"
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: "/(.*)"
        replacement: "$1"
      # Loki exige ≥1 etiqueta por stream; forzar job/instance si el SD no deja etiquetas finales.
      - action: replace
        source_labels: [__meta_docker_container_name]
        regex: "(.+)"
        replacement: docker
        target_label: job
      - action: replace
        source_labels: [__meta_docker_container_name]
        regex: "(.+)"
        replacement: compose
        target_label: instance
    pipeline_stages:
      - docker: {}
