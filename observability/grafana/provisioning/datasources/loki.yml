apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      derivedFields:
        - name: traceId
          datasourceUid: tempo
          matcherRegex: '"traceId":"(\w+)"'
          url: '$${__value.raw}'
          urlDisplayLabel: Ver traza en Tempo
