# Configuración de Grafana Tempo (perfil full).
# Recibe trazas OTLP desde el otel-collector y las indexa en almacenamiento local.
# Para producción se usaría storage S3/GCS y multi-tenant.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
